networks:
  public_net:
    driver: bridge
    # Nginx + Backend giao tiếp ở đây
  private_net:
    driver: bridge
    internal: true # ← KEY: không có route ra Internet
    # Chỉ Backend ↔ MongoDB

services:
  # ---- 1. DATABASE (MongoDB) ----
  mongodb:
    image: mongo:6.0
    container_name: proshop_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: proshop
    volumes:
      - mongo_data:/data/db
    networks:
      - private_net # CHỈ trong private_net
    # KHÔNG có "ports:" → không expose ra host/Internet
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ---- 2. BACKEND (Node.js) ----
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: proshop_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      # Dùng tên service "mongodb" làm hostname (Docker DNS tự resolve)
      MONGO_URI: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongodb:27017/proshop?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID}
    networks:
      - public_net # Nhận request từ Nginx
      - private_net # Kết nối được MongoDB
    depends_on:
      mongodb:
        condition: service_healthy # Chờ MongoDB sẵn sàng
    # KHÔNG có "ports:" → Backend không expose trực tiếp ra ngoài
    volumes:
      - ./uploads:/app/uploads # Lưu trữ ảnh upload persistently
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:5000/api/products",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ---- 3. FRONTEND + NGINX ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: proshop_frontend
    restart: unless-stopped
    networks:
      - public_net # Chỉ cần nói chuyện với Backend
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:80",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ─── GATEWAY: Entry point duy nhất ──────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: proshop_nginx
    ports:
      - "80:80" # HTTP (Phase 2 sẽ thêm 443:443)
      - "443:443" # HTTPS (Phase 2)
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/logs:/var/log/nginx # Phase 3: Promtail đọc log từ đây
      - ./nginx/security_headers.conf:/etc/nginx/security_headers.conf:ro
      - ./nginx/proxy_headers.conf:/etc/nginx/proxy_headers.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro # Phase 2: SSL certs
      - ./certbot/www:/var/www/certbot:ro # Phase 2: Certbot webroot | mkdir -p ./certbot/www    # Tạo thư mục trước khi chạy
      - ./uploads:/app/uploads:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - public_net # Nói chuyện với frontend và backend
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:80",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  mongo_data:
    driver: local
