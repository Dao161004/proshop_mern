groups:
  - name: cpu_alert
    rules:
      - alert: HighCPU
        expr: 100 - (avg by(instance)(rate(node_cpu_seconds_total{mode="idle"}[1m])) * 100) > 85
        for: 10s
        labels:
          severity: critical
        annotations:
          summary: "CPU > 85%"
          description: "CPU usage is above 85% on instance {{ $labels.instance }}"
