route:
  receiver: "telegram"

receivers:
  - name: "telegram"
    telegram_configs:
      - bot_token: "YOUR_TELEGRAM_BOT_TOKEN"
        chat_id: YOUR_TELEGRAM_CHAT_ID
        parse_mode: "HTML"
        message: |
          🚨 <b>{{ .Status | toUpper }}</b>
          Alert: {{ .CommonLabels.alertname }}
          {{ .CommonAnnotations.summary }}
          Instance: {{ .CommonLabels.instance }}
